name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  build-smoke:
    name: Build & Smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: dummy
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: dummy
      NEXT_PUBLIC_FIREBASE_APP_ID: dummy
      WAIT_ON_TIMEOUT: "60000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run smoke

  e2e:
    name: E2E (webcam fallback)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: dummy
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: dummy
      NEXT_PUBLIC_FIREBASE_APP_ID: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rules:
    name: Firestore Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm run test:rules
